<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>P-GATE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0a0a'/><text x='16' y='22' font-family='Helvetica,Arial,sans-serif' font-weight='800' font-size='18' text-anchor='middle' fill='%23fff'>P</text></svg>" />
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <symbol id="i-x" viewBox="0 0 24 24">
      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
    </symbol>
    <symbol id="i-yt" viewBox="0 0 24 24">
      <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
    </symbol>
    <symbol id="i-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <rect x="5" y="11" width="14" height="10"/>
      <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
    </symbol>
    <symbol id="i-unlock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <rect x="5" y="11" width="14" height="10"/>
      <path d="M8 11V7a4 4 0 0 1 7.5-2"/>
    </symbol>
    <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M4 12l5 5 11-12"/>
    </symbol>
    <symbol id="i-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M5 12h14M13 6l6 6-6 6"/>
    </symbol>
    <symbol id="i-dl" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M12 4v12M6 11l6 6 6-6M5 20h14"/>
    </symbol>
    <symbol id="i-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M6 6l12 12M18 6L6 18"/>
    </symbol>
    <symbol id="i-reset" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M4 4v6h6M20 12a8 8 0 1 1-3-6.2L20 8"/>
    </symbol>
  </defs>
</svg>

<header class="bar">
  <div class="bar-l">
    <span class="mark">P</span>
    <span class="brand">P&middot;GATE</span>
  </div>
  <div class="bar-c">
    <span class="meta">SOCIAL ACCESS GATE</span>
  </div>
  <div class="bar-r">
    <span class="counter mono">
      <span id="counterNum">00</span><span class="sep">/</span><span id="counterTotal">00</span>
    </span>
    <button class="btn-bare" id="resetBtn" aria-label="reset">
      <svg><use href="#i-reset"/></svg>
    </button>
  </div>
</header>

<section class="section-head">
  <div class="sh-l">
    <span class="kicker mono">INDEX &mdash; 01</span>
    <h1 class="h1">COLLECTION</h1>
  </div>
  <div class="sh-r mono">
    <span id="indexCount">00</span> ITEMS
  </div>
</section>

<main class="grid" id="grid"></main>

<footer class="foot mono">
  <span>P&middot;GATE / v1</span>
  <span>&copy; PURUKICHI</span>
</footer>

<div class="modal" id="modal" hidden>
  <div class="modal-bd" data-close></div>
  <div class="modal-sheet">
    <div class="sheet-bar">
      <span class="mono" id="mIndex">01</span>
      <span class="mono" id="mTitle"></span>
      <button class="btn-bare" data-close aria-label="close">
        <svg><use href="#i-close"/></svg>
      </button>
    </div>

    <div class="sheet-cover" id="mCover"></div>

    <div class="sheet-block">
      <div class="block-head mono">
        <span>FOLLOW REQUIRED</span>
        <span><span id="mDone">00</span>/<span id="mTotal">00</span></span>
      </div>
      <ul class="gate-list" id="mGates"></ul>
    </div>

    <div class="sheet-block" id="mDlBlock">
      <div class="block-head mono">
        <span>DOWNLOAD</span>
        <span class="state-tag" id="mDlState">LOCKED</span>
      </div>
      <ul class="dl-list" id="mDownloads"></ul>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
