<header class="topbar">
  <div class="brand" aria-hidden="true">
    <svg class="logo"><use href="#i-key"/></svg>
  </div>
  <div class="counter" id="counter">
    <svg><use href="#i-unlock"/></svg>
    <span id="counterNum">0</span>
    <span class="slash">/</span>
    <span id="counterTotal">0</span>
  </div>
  <button class="iconbtn" id="resetBtn" aria-label="reset">
    <svg><use href="#i-reset"/></svg>
  </button>
</header>

<main class="grid" id="grid"></main>

<div class="modal" id="modal" hidden>
  <div class="modal-backdrop" data-close></div>
  <div class="modal-card">
    <button class="iconbtn close" data-close aria-label="close">
      <svg><use href="#i-close"/></svg>
    </button>

    <div class="modal-header">
      <div class="cover" id="mCover"></div>
      <div class="state" id="mState">
        <svg class="lock-icon"><use href="#i-lock"/></svg>
      </div>
    </div>

    <div class="gates" id="mGates"></div>

    <div class="reward" id="mReward" hidden>
      <a class="reward-btn" id="mRewardLink" target="_blank" rel="noopener">
        <svg><use href="#i-dl"/></svg>
      </a>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
